name: Secure Build & Multi-Repo Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor
      
      - name: Secure Build Process
        run: |
          python build_secure.py
          
      - name: Verify Build Artifact
        run: |
          ls -R dist/
          if [ ! -f dist/CA_Office_PDF_Utility_v1.1.2.zip ]; then
            echo "Error: Build artifact not found!"
            exit 1
          fi
        shell: bash

      - name: Verify Build Artifact
        run: |
          Write-Host "Verifying dist contents..."
          Get-ChildItem -Path dist/
          $ZIP_FILE = "dist/CA_Office_PDF_Utility_v1.1.2.zip"
          if (Test-Path $ZIP_FILE) {
            Write-Host "Build Artifact confirmed: $ZIP_FILE"
          } else {
            Write-Error "Build artifact missing: $ZIP_FILE"
            exit 1
          }
        shell: pwsh

      - name: Upload to Public Repository
        if: success()
        shell: pwsh
        run: |
          $REPO = "marutitechsolutions/ca-office-utility"
          $TAG = "v1.1.2"
          $ZIP_FILE = "dist/CA_Office_PDF_Utility_v1.1.2.zip"
          
          Write-Host "--- AUTHENTICATION CHECK ---"
          gh auth status
          
          Write-Host "--- RELEASE METADATA ---"
          Write-Host "Target Repository: $REPO"
          Write-Host "Target Tag: $TAG"
          Write-Host "Asset Path: $(Get-Item $ZIP_FILE | Select-Object -ExpandProperty FullName)"
          
          Write-Host "--- UPLOAD PROCESS ---"
          # Try upload, fallback to create
          $err = gh release upload $TAG $ZIP_FILE --repo $REPO --clobber 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Upload failed or release missing. Attempting to create release..."
            gh release create $TAG $ZIP_FILE --repo $REPO --title "$TAG Production Release" --notes "Official stabilized build sync."
          }
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install System Dependencies
        run: brew install tesseract
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          grep -vE "pywin32|mscapi" requirements.txt > req_mac.txt
          pip install -r req_mac.txt
          pip install pyinstaller pyarmor
          
      - name: Secure Build Process (Mac)
        run: |
          python build_secure.py
          
      - name: Verify Build Artifact (Mac)
        run: |
          ls -R dist/
          if [ ! -f dist/CA_Office_PDF_Utility_v1.1.2.zip ]; then
            echo "Error: Build artifact not found!"
            exit 1
          fi

      - name: Upload to Public Repository (Mac)
        if: success()
        run: |
          REPO="marutitechsolutions/ca-office-utility"
          TAG="v1.1.2"
          ZIP_FILE="dist/CA_Office_PDF_Utility_v1.1.2.zip"
          
          echo "--- AUTHENTICATION CHECK (MAC) ---"
          gh auth status
          
          echo "--- RELEASE METADATA ---"
          echo "Target Repository: $REPO"
          echo "Target Tag: $TAG"
          echo "Asset Path: $(pwd)/$ZIP_FILE"
          
          echo "--- UPLOAD PROCESS ---"
          gh release upload $TAG $ZIP_FILE --repo $REPO --clobber || \
          gh release create $TAG $ZIP_FILE --repo $REPO --title "$TAG Production Release" --notes "Official stabilized build sync (macOS)."
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
