name: Secure Build & Multi-Repo Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor
      
      - name: Secure Build Process
        run: |
          python build_secure.py
          
      - name: Zip Sanitized Release
        run: |
          Compress-Archive -Path dist/CA_Office_PDF_Utility/* -DestinationPath dist/CA_Office_Utility_Windows.zip
          
      - name: Upload to Public Repository
        run: |
          # Use GH CLI to push to the PUBLIC repository releases
          gh release upload latest dist/CA_Office_Utility_Windows.zip --repo marutitechsolutions/ca-office-utility --clobber
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install System Dependencies
        run: brew install tesseract
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          grep -vE "pywin32|mscapi" requirements.txt > req_mac.txt
          pip install -r req_mac.txt
          pip install pyinstaller pyarmor
          
      - name: Secure Build Process (Mac)
        run: |
          python build_secure.py
          
      - name: Zip Sanitized App
        run: |
          cd dist
          zip -r CA_Office_Utility_Mac.zip CA_Office_PDF_Utility/
          
      - name: Upload to Public Repository
        run: |
          gh release upload latest dist/CA_Office_Utility_Mac.zip --repo marutitechsolutions/ca-office-utility --clobber
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
